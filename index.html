<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafetyControl Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="auth-panel" aria-label="로그인">
        <div class="tabs" role="tablist" aria-label="로그인 유형">
          <button class="tab-button active" id="user-tab" role="tab" aria-selected="true" aria-controls="user-panel" type="button">
            일반 사용자
          </button>
          <button class="tab-button" id="admin-tab" role="tab" aria-selected="false" aria-controls="admin-panel" type="button">
            관리자
          </button>
        </div>

        <div class="auth-form active" id="user-panel" role="tabpanel" aria-labelledby="user-tab">
          <div class="mode-switch" role="tablist" aria-label="일반 사용자 절차">
            <button class="mode-button active" id="register-mode" type="button" aria-selected="true">
              최초 등록
            </button>
            <button class="mode-button" id="login-mode" type="button" aria-selected="false">
              로그인
            </button>
          </div>

          <form class="worker-flow active" id="worker-register-form">
            <label>
              연락처
              <input id="register-phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000" required />
            </label>

            <label>
              인증 코드
              <div class="code-row">
                <input id="register-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="mock: 123456" maxlength="6" required />
                <button class="secondary-button request-code" type="button" data-phone-input="register-phone">코드 요청</button>
              </div>
            </label>

            <label>
              비밀번호 설정
              <input id="register-password" name="password" type="password" autocomplete="new-password" placeholder="8자 이상" required />
            </label>

            <button class="primary-button" type="submit">등록 승인 요청</button>
          </form>

          <form class="worker-flow" id="worker-login-form" hidden>
            <label>
              이름
              <input id="login-name" name="name" type="text" autocomplete="name" placeholder="홍길동" required />
            </label>

            <label>
              연락처
              <input id="login-phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000" required />
            </label>

            <label>
              인증 코드
              <div class="code-row">
                <input id="login-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="mock: 123456" maxlength="6" required />
                <button class="secondary-button request-code" type="button" data-phone-input="login-phone">코드 요청</button>
              </div>
            </label>

            <label>
              비밀번호
              <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="등록한 비밀번호" required />
            </label>

            <button class="primary-button" type="submit">일반 사용자 로그인</button>
          </form>
        </div>

        <div class="auth-form" id="admin-panel" role="tabpanel" aria-labelledby="admin-tab" hidden>
          <div class="admin-copy">
            <h2>관리자 Google 로그인</h2>
            <p>mock 단계에서는 safetycontrol.local Workspace 계정만 통과합니다.</p>
          </div>
          <button class="google-button" id="google-login" type="button">
            <span class="google-g" aria-hidden="true">G</span>
            Google 계정으로 계속
          </button>
        </div>

        <p class="message" id="auth-message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./auth-client.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
