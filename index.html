<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safety Control Demo Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="demo-hub">
      <section class="hub-panel" aria-labelledby="hub-title">
        <p class="eyebrow">Demo Site</p>
        <h1 id="hub-title">Safety Control System Web</h1>
        <p class="summary">
          현재 작업 중인 화면 데모로 이동하는 루트 페이지입니다. 각 버튼은 API
          연결 전 목업 데이터 기반 데모 페이지로 연결됩니다.
        </p>

        <div class="demo-list" aria-label="데모 페이지 목록">
          <a class="demo-link" href="./demos/login/">
            <span>
              <strong>Log in Demo</strong>
              <small>일반 사용자 등록/로그인과 관리자 mock Google 로그인</small>
            </span>
            <span aria-hidden="true">Go</span>
          </a>

          <a class="demo-link" href="./demos/login-register-link/">
            <span>
              <strong>Log in Register Link Demo</strong>
              <small>최초 등록을 로그인 화면 하단 링크로 배치한 변형 데모</small>
            </span>
            <span aria-hidden="true">Go</span>
          </a>

          <a class="demo-link" href="./demos/dashboard/">
            <span>
              <strong>Dashboard Demo</strong>
              <small>사용자 정보, 현장 날씨, 오늘 할 일, 안전 알림 목업</small>
            </span>
            <span aria-hidden="true">Go</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
