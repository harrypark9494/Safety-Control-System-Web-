<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Information Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="documents-shell">
      <section class="documents-panel" aria-labelledby="documents-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Payroll Onboarding</p>
            <h1 id="documents-title">급여 정보 등록</h1>
          </div>
          <span class="status-pill">모바일 확인 기준</span>
        </div>

        <p class="summary">
          로그인 이후 HR 팀이 급여 처리에 필요한 기본 정보, 계좌 정보, 사본
          이미지를 한 번에 수집하는 화면입니다.
        </p>

        <form class="documents-form" id="documents-form">
          <section class="form-section" aria-labelledby="basic-info-title">
            <div class="section-heading">
              <span class="step-badge">1</span>
              <div>
                <h2 id="basic-info-title">기본 정보 입력</h2>
                <p>등록된 연락처와 DB 근무 일정을 확인하고 추가 정보를 입력합니다.</p>
              </div>
            </div>

            <div class="readonly-grid" aria-label="DB 확인 정보">
              <div>
                <span>연락처</span>
                <strong id="worker-phone"></strong>
              </div>
              <div>
                <span>근무 일정</span>
                <strong id="worker-schedule"></strong>
              </div>
            </div>

            <label>
              근무 유형
              <select id="work-type" name="workType" required>
                <option value="">선택하세요</option>
              </select>
            </label>

            <label>
              주민등록번호
              <input
                id="resident-number"
                name="residentNumber"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                placeholder="000000-0000000"
                pattern="[0-9]{6}-[0-9]{7}"
                maxlength="14"
                required
              />
            </label>

            <label>
              주소
              <div class="address-row">
                <input id="address" name="address" type="text" placeholder="주소 검색 후 입력" required />
                <button class="secondary-button" id="search-address" type="button">주소 검색</button>
              </div>
            </label>

            <label class="agreement">
              <input id="privacy-agreement" name="privacyAgreement" type="checkbox" required />
              <span>급여 및 인사 처리를 위한 개인정보 수집에 동의합니다.</span>
            </label>
          </section>

          <section class="form-section" aria-labelledby="document-info-title">
            <div class="section-heading">
              <span class="step-badge">2</span>
              <div>
                <h2 id="document-info-title">서류 제출</h2>
                <p>신분증 사본과 급여 입금 계좌 정보를 함께 등록합니다.</p>
              </div>
            </div>

            <div class="file-field">
              <label class="file-title" for="id-card-file">
                <strong>신분증 사본 이미지</strong>
                <small>이미지 또는 PDF, 미리보기 제공</small>
              </label>
              <input id="id-card-file" name="idCardFile" type="file" accept="image/*,.pdf" required />
              <output class="file-preview" id="id-card-preview" aria-live="polite">
                <span>선택된 파일 없음</span>
              </output>
            </div>

            <div class="bank-grid">
              <label>
                은행명
                <input id="bank-name" name="bankName" type="text" placeholder="예: 국민은행" required />
              </label>
              <label>
                예금주
                <input id="account-holder" name="accountHolder" type="text" placeholder="예: 박현장" required />
              </label>
              <label class="full-field">
                계좌번호
                <input id="account-number" name="accountNumber" type="text" inputmode="numeric" placeholder="000000-00-000000" required />
              </label>
            </div>

            <div class="file-field">
              <label class="file-title" for="bankbook-file">
                <strong>통장 사본 이미지</strong>
                <small>이미지 또는 PDF, 미리보기 제공</small>
              </label>
              <input id="bankbook-file" name="bankbookFile" type="file" accept="image/*,.pdf" required />
              <output class="file-preview" id="bankbook-preview" aria-live="polite">
                <span>선택된 파일 없음</span>
              </output>
            </div>
          </section>

          <section class="submit-section" aria-label="제출">
            <button class="primary-button" type="submit">HR 제출 정보 저장</button>
            <p class="message" id="documents-message" role="status" aria-live="polite"></p>
          </section>
        </form>
      </section>
    </main>

    <script src="../shared/auth/auth-config.js"></script>
    <script src="../shared/auth/payroll-documents.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
