<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Information Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header" aria-labelledby="documents-title">
        <h1>워터밤 안전 관제 시스템</h1>
      </header>

      <section class="app-panel app-panel--wide" aria-label="급여 정보 등록 입력 양식">
        <div class="page-heading">
          <div>
            <p class="eyebrow">Payroll Onboarding</p>
            <h2 id="documents-title">급여 정보 등록</h2>
          </div>
          <div class="progress-steps" aria-label="입력 단계">
            <span class="progress-step active" id="basic-step-indicator" data-step-title="기본 정보 입력" aria-current="step">
              <span class="progress-number">1</span>
              <span class="progress-label"></span>
            </span>
            <span class="progress-step" id="document-step-indicator" data-step-title="서류 제출">
              <span class="progress-number">2</span>
              <span class="progress-label"></span>
            </span>
          </div>
        </div>

        <form class="documents-form" id="documents-form">
          <section class="form-section active" id="basic-step" aria-labelledby="basic-info-title">
            <div class="section-heading">
              <span class="step-badge">1</span>
              <div>
                <h2 id="basic-info-title"></h2>
              </div>
            </div>

            <div class="section-intro">
              <strong id="worker-greeting"></strong>
              <span>기본 정보를 확인해주세요.</span>
            </div>

            <div class="readonly-card" aria-label="확인 정보">
              <div class="readonly-row">
                <span>연락처</span>
                <strong id="worker-phone"></strong>
              </div>
              <div class="readonly-row">
                <span>근무 일정</span>
                <strong id="worker-schedule"></strong>
              </div>
            </div>

            <div class="additional-info">
              <h3>추가 정보 입력</h3>

              <label>
                주민등록번호
                <input
                  id="resident-number"
                  name="residentNumber"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  placeholder="000000-0000000"
                  pattern="[0-9]{6}-[0-9]{7}"
                  maxlength="14"
                  required
                />
              </label>

              <fieldset class="field-group">
                <legend>주소</legend>
                <div class="address-fields">
                  <div class="address-row">
                    <input id="postcode" name="postcode" type="text" inputmode="numeric" placeholder="우편번호" readonly required />
                    <button class="secondary-button" id="search-address" type="button">검색</button>
                  </div>
                  <input id="address" name="address" type="text" placeholder="기본 주소" readonly required />
                  <input id="address-detail" name="addressDetail" type="text" placeholder="상세주소 입력" />
                </div>
              </fieldset>
            </div>

            <label class="agreement">
              <input id="privacy-agreement" name="privacyAgreement" type="checkbox" required />
              <span>급여 및 인사 처리를 위한 개인정보 수집에 동의합니다.</span>
            </label>

            <div class="step-actions">
              <button class="primary-button" id="next-step" type="button">다음</button>
            </div>
          </section>

          <section class="form-section" id="document-step" aria-labelledby="document-info-title" hidden>
            <div class="section-heading">
              <span class="step-badge">2</span>
              <div>
                <h2 id="document-info-title"></h2>
              </div>
            </div>

            <div class="upload-card">
              <p class="upload-title">신분증 사본 <span>(필수)</span></p>
              <input id="id-card-file" class="sr-only" name="idCardFile" type="file" accept="image/*,.pdf" required />
              <label class="upload-target" id="id-card-target" for="id-card-file">
                <output class="file-preview empty" id="id-card-preview" aria-live="polite">
                  <span class="upload-icon" aria-hidden="true"></span>
                  <strong>이미지를 눌러 업로드하세요.</strong>
                  <small>이미지 또는 PDF</small>
                </output>
              </label>
            </div>

            <div class="bank-grid">
              <div class="bank-field">
                <label for="bank-name">은행명</label>
                <input
                  id="bank-name"
                  name="bankName"
                  type="text"
                  placeholder="은행명"
                  autocomplete="off"
                  required
                />
              </div>
              <button class="secondary-button bank-toggle" id="bank-list-toggle" type="button" aria-expanded="false" aria-controls="bank-list-panel">
                은행 목록
              </button>
              <label>
                예금주
                <input id="account-holder" name="accountHolder" type="text" placeholder="예: 작업자 A" required />
              </label>
              <div class="bank-list-panel full-field" id="bank-list-panel" hidden>
                <div class="bank-list-head">
                  <strong>지원 은행 선택</strong>
                </div>
                <div class="bank-list" id="bank-list" aria-label="지원 은행 목록"></div>
              </div>
              <label class="full-field">
                계좌번호
                <input id="account-number" name="accountNumber" type="text" autocomplete="off" placeholder="은행별 계좌번호 입력" required />
              </label>
            </div>

            <div class="upload-card">
              <p class="upload-title">통장 사본 <span>(필수)</span></p>
              <input id="bankbook-file" class="sr-only" name="bankbookFile" type="file" accept="image/*,.pdf" required />
              <label class="upload-target" id="bankbook-target" for="bankbook-file">
                <output class="file-preview empty" id="bankbook-preview" aria-live="polite">
                  <span class="upload-icon" aria-hidden="true"></span>
                  <strong>이미지를 눌러 업로드하세요.</strong>
                  <small>이미지 또는 PDF</small>
                </output>
              </label>
            </div>

            <div class="step-actions split">
              <button class="secondary-button" id="prev-step" type="button">이전</button>
              <button class="primary-button" type="submit">HR 제출 정보 저장</button>
            </div>
          </section>

          <p class="message" id="documents-message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="../shared/auth/auth-config.js"></script>
    <script src="../shared/auth/payroll-documents.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
