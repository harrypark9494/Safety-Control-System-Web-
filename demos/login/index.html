<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header" aria-labelledby="login-title">
        <h1>워터밤 안전 관제 시스템</h1>
      </header>

      <section class="app-panel app-panel--narrow" aria-label="로그인 양식">
        <div class="page-heading">
          <div>
            <p class="eyebrow">Safety Control</p>
            <h2 id="login-title">로그인</h2>
          </div>
          <span class="status-pill">Mock 인증</span>
        </div>

        <div class="tabs" role="tablist" aria-label="로그인 유형">
          <button class="tab-button active" id="user-tab" role="tab" aria-selected="true" aria-controls="user-panel" type="button">
            일반 사용자
          </button>
          <button class="tab-button" id="admin-tab" role="tab" aria-selected="false" aria-controls="admin-panel" type="button">
            관리자
          </button>
        </div>

        <div class="auth-form active" id="user-panel" role="tabpanel" aria-labelledby="user-tab">
          <div class="mode-switch" role="tablist" aria-label="일반 사용자 절차">
            <button class="mode-button active" id="register-mode" type="button" aria-selected="true">
              최초 등록
            </button>
            <button class="mode-button" id="login-mode" type="button" aria-selected="false">
              로그인
            </button>
          </div>

          <aside class="demo-account" aria-label="자동 승인 데모 계정">
            <div>
              <strong>자동 승인 데모 계정</strong>
              <span id="demo-account-summary"></span>
            </div>
            <select id="demo-account-select" aria-label="데모 계정 선택"></select>
            <button class="secondary-button" id="fill-demo-worker" type="button">입력</button>
          </aside>

          <form class="worker-flow active" id="worker-register-form">
            <label>
              연락처
              <input id="register-phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000" pattern="01[016789]-[0-9]{3,4}-[0-9]{4}" maxlength="13" required />
            </label>

            <label>
              근무 유형
              <select id="register-work-type" name="workType" required>
                <option value="">선택하세요</option>
              </select>
            </label>

            <label>
              인증 코드
              <div class="code-row">
                <input id="register-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="mock: 123456" maxlength="6" required />
                <button class="secondary-button request-code" type="button" data-phone-input="register-phone">코드 요청</button>
              </div>
            </label>

            <label>
              비밀번호 설정
              <input id="register-password" name="password" type="password" autocomplete="new-password" placeholder="8자 이상" required />
            </label>

            <button class="primary-button" type="submit">등록 승인 요청</button>
          </form>

          <form class="worker-flow" id="worker-login-form" hidden>
            <label>
              이름
              <input id="login-name" name="name" type="text" autocomplete="name" placeholder="박현장" required />
            </label>

            <label>
              연락처
              <input id="login-phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000" pattern="01[016789]-[0-9]{3,4}-[0-9]{4}" maxlength="13" required />
            </label>

            <label>
              근무 유형
              <select id="login-work-type" name="workType" required>
                <option value="">선택하세요</option>
              </select>
            </label>

            <label>
              인증 코드
              <div class="code-row">
                <input id="login-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="mock: 123456" maxlength="6" required />
                <button class="secondary-button request-code" type="button" data-phone-input="login-phone">코드 요청</button>
              </div>
            </label>

            <label>
              비밀번호
              <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="등록된 비밀번호" required />
            </label>

            <button class="primary-button" type="submit">대시보드로 로그인</button>
          </form>
        </div>

        <div class="auth-form" id="admin-panel" role="tabpanel" aria-labelledby="admin-tab" hidden>
          <div class="admin-copy">
            <h2>관리자 Google 로그인</h2>
          </div>
          <button class="google-button" id="google-login" type="button">
            <span class="google-g" aria-hidden="true">G</span>
            Google 계정으로 계속
          </button>
        </div>

        <p class="message" id="auth-message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="../shared/auth/auth-config.js"></script>
    <script src="../shared/auth/mock-auth-client.js"></script>
    <script src="../shared/auth/api-auth-client.js"></script>
    <script src="../shared/auth/auth-client.js"></script>
    <script src="../shared/auth/payroll-documents.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
