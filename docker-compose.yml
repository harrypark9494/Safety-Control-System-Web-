services:
  postgres:
    image: postgres:16-alpine
    container_name: safety-control-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: safety_control_local
      POSTGRES_USER: safety_control
      POSTGRES_PASSWORD: safety_control_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety_control -d safety_control_local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
