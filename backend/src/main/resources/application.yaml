spring:
  application:
    name: safety-control-backend
  datasource:
    url: jdbc:h2:mem:safety_control;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

firebase:
  admin:
    enabled: ${FIREBASE_ADMIN_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}

admin:
  auth:
    allowed-emails: ${ADMIN_ALLOWED_EMAILS:}
    allowed-domain: ${ADMIN_ALLOWED_DOMAIN:}
